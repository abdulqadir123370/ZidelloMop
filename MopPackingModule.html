<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mop Packing — Packing Department</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EDEDE7;
    --surface:#FFFFFF;
    --ink:#1B2320;
    --ink-soft:#5B6B64;
    --kraft:#C08552;
    --tape:#E2A33B;
    --tape-ink:#5B3E0E;
    --stripe:#2B6E63;
    --alert:#B23A2E;
    --line:#DAD6CC;
    --line-strong:#B9B2A2;
    --rail-w:220px;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{margin:0;}
  html,body{height:100%;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    font-size:14px;
    line-height:1.45;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.disp{
    font-family:'Oswald',sans-serif;
    font-weight:600;
    letter-spacing:.01em;
    margin:0;
  }
  .mono{font-family:'IBM Plex Mono',monospace;}
  .eyebrow{
    font-family:'Oswald',sans-serif;
    font-size:11px;
    font-weight:600;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--ink-soft);
  }
  a{color:inherit;}
  button{font-family:inherit;}
  :focus-visible{outline:2.5px solid var(--tape); outline-offset:2px;}

  /* ---------- layout ---------- */
  .app{display:flex; min-height:100vh;}
  .rail{
    width:var(--rail-w); flex:0 0 var(--rail-w);
    background:var(--ink); color:#EDEDE7;
    display:flex; flex-direction:column;
    position:sticky; top:0; height:100vh;
  }
  .rail-brand{
    padding:22px 20px 16px 20px;
    border-bottom:1px solid rgba(255,255,255,.1);
  }
  .rail-brand .disp{font-size:19px; color:#fff; letter-spacing:.02em;}
  .rail-brand .sub{font-size:11px; color:#B9C4BE; margin-top:3px; font-family:'IBM Plex Mono',monospace; letter-spacing:.04em;}
  .rail-nav{padding:14px 10px; display:flex; flex-direction:column; gap:2px; flex:1; overflow-y:auto;}
  .rail-btn{
    display:flex; align-items:center; gap:11px;
    background:transparent; border:none; color:#CBD3CF;
    padding:10px 12px; border-radius:7px; cursor:pointer;
    font-family:'Oswald',sans-serif; font-size:13px; letter-spacing:.03em; text-transform:uppercase;
    text-align:left; width:100%;
    border-left:3px solid transparent;
  }
  .rail-btn svg{width:16px; height:16px; flex:0 0 16px; opacity:.85;}
  .rail-btn .lbl-s{display:none;}
  .rail-btn:hover{background:rgba(255,255,255,.06); color:#fff;}
  .rail-btn.active{background:rgba(226,163,59,.14); color:#fff; border-left-color:var(--tape);}
  .rail-foot{padding:14px 20px 18px; font-size:11px; color:#8A9691; border-top:1px solid rgba(255,255,255,.08); font-family:'IBM Plex Mono',monospace;}

  .main{flex:1; min-width:0; display:flex; flex-direction:column;}
  .topbar{
    background:var(--surface); border-bottom:1px solid var(--line);
    padding:16px 26px; display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:5;
  }
  .topbar .disp{font-size:20px;}
  .topbar-user{font-size:12px; color:var(--ink-soft); display:flex; align-items:center; gap:8px;}
  .view{padding:24px 26px 60px; max-width:1180px;}

  /* ---------- primitives ---------- */
  .btn{
    display:inline-flex; align-items:center; gap:7px;
    padding:9px 15px; border-radius:7px; border:1.5px solid var(--ink);
    background:var(--ink); color:#fff; cursor:pointer;
    font-size:13px; font-weight:600; font-family:'Inter',sans-serif;
  }
  .btn:hover{opacity:.9;}
  .btn-primary{background:var(--tape); border-color:var(--tape); color:#3A2A05;}
  .btn-ghost{background:transparent; color:var(--ink); border-color:var(--line-strong);}
  .btn-ghost:hover{background:#fff;}
  .btn-danger{background:transparent; color:var(--alert); border-color:var(--alert);}
  .btn-sm{padding:5px 10px; font-size:12px; border-radius:6px;}
  .btn:disabled{opacity:.4; cursor:not-allowed;}

  .card{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
    padding:18px 20px;
  }
  .grid{display:grid; gap:14px;}
  .grid-stats{grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); margin-bottom:20px;}
  .stat-card{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
    padding:16px 18px; position:relative; overflow:hidden;
  }
  .stat-card .eyebrow{margin-bottom:8px;}
  .stat-card .num{font-family:'Oswald',sans-serif; font-size:28px; font-weight:600;}
  .stat-card .sub{font-size:12px; color:var(--ink-soft); margin-top:2px;}
  .stat-card.warn{border-color:#E7C79A;}
  .stat-card.warn .num{color:var(--alert);}
  .stat-card.good .num{color:var(--stripe);}

  .section-head{display:flex; align-items:center; justify-content:space-between; margin:26px 0 12px; flex-wrap:wrap; gap:10px;}
  .section-head:first-child{margin-top:0;}
  .section-head h2{font-size:16px;}

  table{width:100%; border-collapse:collapse;}
  th{
    text-align:left; font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:.08em;
    text-transform:uppercase; color:var(--ink-soft); font-weight:500;
    padding:8px 10px; border-bottom:1.5px solid var(--line-strong);
  }
  td{padding:10px 10px; border-bottom:1px solid var(--line); font-size:13px; vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  .tbl-wrap{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; overflow-x:auto;}
  .tbl-wrap table{min-width:560px;}

  .tag{
    display:inline-flex; align-items:center; gap:6px;
    font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:500;
    padding:3px 10px 3px 17px; border:1.5px dashed var(--line-strong);
    border-radius:4px; background:#fff; position:relative; color:var(--ink); letter-spacing:.02em;
    white-space:nowrap;
  }
  .tag::before{
    content:''; position:absolute; left:5px; top:50%; transform:translateY(-50%);
    width:5px; height:5px; border-radius:50%; background:var(--bg); border:1.5px solid var(--line-strong);
  }

  .pill{display:inline-block; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:600; letter-spacing:.02em;}
  .pill-good{background:#E1EEE9; color:var(--stripe);}
  .pill-warn{background:#F7E2D0; color:var(--alert);}
  .pill-neutral{background:#EFEDE6; color:var(--ink-soft);}

  .delta-pos{color:var(--stripe); font-weight:600;}
  .delta-neg{color:var(--alert); font-weight:600;}

  .field{margin-bottom:13px;}
  .field label{display:block; font-size:12px; font-weight:600; margin-bottom:5px; color:var(--ink-soft);}
  .field input, .field select, .field textarea{
    width:100%; padding:9px 11px; border:1.5px solid var(--line-strong); border-radius:7px;
    background:#fff; font-family:'Inter',sans-serif; font-size:13.5px; color:var(--ink);
  }
  .field input.mono{font-family:'IBM Plex Mono',monospace;}
  .field textarea{resize:vertical; min-height:56px;}
  .field-row{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .hint{font-size:11.5px; color:var(--ink-soft); margin-top:4px;}
  .balance-hint{
    display:inline-flex; align-items:center; gap:6px; font-family:'IBM Plex Mono',monospace;
    font-size:12.5px; background:var(--bg); border:1px solid var(--line); border-radius:6px;
    padding:5px 10px; margin-bottom:12px;
  }
  .preview-box{
    background:var(--bg); border:1.5px dashed var(--line-strong); border-radius:8px;
    padding:12px 14px; margin-bottom:14px; font-family:'IBM Plex Mono',monospace; font-size:13px;
  }

  .empty{
    text-align:center; padding:46px 20px; color:var(--ink-soft);
    background:repeating-linear-gradient(135deg,rgba(0,0,0,.018) 0 10px,transparent 10px 20px);
    border:1.5px dashed var(--line-strong); border-radius:var(--radius);
  }
  .empty .disp{font-size:15px; color:var(--ink); margin-bottom:6px;}
  .empty p{margin:0 0 14px; font-size:13px;}

  /* ---------- modal ---------- */
  .modal-root{
    position:fixed; inset:0; background:rgba(20,24,22,.5);
    display:flex; align-items:center; justify-content:center; z-index:50; padding:20px;
  }
  .modal-root.hidden{display:none;}
  .modal{
    background:#fff; border-radius:12px; width:100%; max-width:480px;
    max-height:88vh; overflow-y:auto; padding:22px 24px 24px;
    box-shadow:0 20px 50px rgba(0,0,0,.25);
  }
  .modal-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;}
  .modal-head h3{font-size:17px;}
  .modal-close{background:none; border:none; cursor:pointer; font-size:18px; color:var(--ink-soft); line-height:1; padding:4px;}
  .modal-actions{display:flex; justify-content:flex-end; gap:10px; margin-top:18px;}

  /* ---------- toast ---------- */
  .toast-root{position:fixed; bottom:22px; right:22px; z-index:80; display:flex; flex-direction:column; gap:8px; align-items:flex-end;}
  .toast{
    background:var(--ink); color:#fff; padding:10px 16px; border-radius:8px; font-size:13px;
    box-shadow:0 8px 20px rgba(0,0,0,.2);
  }
  .toast.err{background:var(--alert);}
  .toast.ok{background:var(--stripe);}

  .stamp-wrap{position:fixed; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none; z-index:90;}
  .stamp{
    font-family:'Oswald',sans-serif; font-weight:700; font-size:22px; letter-spacing:.05em;
    color:var(--stripe); border:4px solid var(--stripe); border-radius:10px;
    padding:14px 26px; text-transform:uppercase; background:rgba(255,255,255,.92);
    transform:rotate(-6deg) scale(1.5); opacity:0; text-align:center;
  }
  @media (prefers-reduced-motion: no-preference){
    .stamp{animation:stampIn .55s cubic-bezier(.2,1.4,.4,1) forwards;}
  }
  @media (prefers-reduced-motion: reduce){
    .stamp{opacity:1; transform:rotate(-6deg) scale(1);}
  }
  @keyframes stampIn{
    0%{opacity:0; transform:rotate(-6deg) scale(1.9);}
    60%{opacity:1; transform:rotate(-6deg) scale(.96);}
    100%{opacity:1; transform:rotate(-6deg) scale(1);}
  }

  .row-x{background:none; border:none; color:var(--alert); cursor:pointer; font-size:16px;}

  .mob-nav{display:none;}
  @media (max-width:820px){
    .app{flex-direction:column;}
    .rail{position:sticky; top:0; left:0; right:0; height:auto; width:100%; flex:0 0 auto; flex-direction:column; z-index:30; padding:0;}
    .rail-brand{display:none;}
    .rail-nav{display:grid; grid-template-columns:repeat(4,1fr); gap:3px; padding:8px; overflow:visible; flex:none;}
    .rail-btn{flex-direction:column; gap:4px; padding:8px 3px 7px; white-space:normal; border-radius:8px; justify-content:center; border-left:none;}
    .rail-btn svg{width:18px; height:18px;}
    .rail-btn .lbl{display:none;}
    .rail-btn .lbl-s{display:block; font-size:11px; letter-spacing:.01em; line-height:1.2; text-transform:none; font-weight:500;}
    .rail-btn.active{background:rgba(226,163,59,.16); box-shadow:inset 0 0 0 1.5px var(--tape);}
    .rail-foot{display:none;}
    .field-row{grid-template-columns:1fr;}
  }
  @media print{
    .rail,.topbar,.btn,button,.no-print{display:none !important;}
    .view{padding:0;}
    body{background:#fff;}
    .print-sheet{border:none !important; box-shadow:none !important; padding:0 !important;}
  }
</style>

<body>

<div class="app">
  <aside class="rail" id="rail">
    <div class="rail-brand">
      <div class="disp">MOP PACKING</div>
      <div class="sub">PACKING DEPARTMENT</div>
    </div>
    <nav class="rail-nav" id="railNav"></nav>
    <div class="rail-foot">Synced live \u00b7 shared cloud data</div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="disp" id="topbarTitle">Dashboard</div>
      <div class="topbar-user" id="topbarUser"></div>
    </header>
    <main class="view" id="view"></main>
  </div>
</div>

<div class="modal-root hidden" id="modalRoot"></div>
<div class="toast-root" id="toastRoot"></div>

<script type="module">
/* ============================================================
   MOP PACKING MODULE — v3.0 (Cloud edition)
   Rebuilt to follow the exact written procedure:
   Step 1  Refill stock IN          (challan)
   Step 2  Stock -> Packing         (challan) -> complete cartons + loose pieces
   Step 2.5  Loose pieces -> Refill (challan)
   Step 3  Dispatch complete cartons (challan) -> Dispatch report
   Ledgers: Refill, Finished Goods, Loose Pieces

   Data now lives in Firebase Firestore instead of localStorage, so every
   device/browser sees the same shared, real-time data. All stock-changing
   actions run inside Firestore transactions (read-then-write, atomic) so
   two people editing at the same moment can't silently overwrite or
   corrupt each other's changes.
   ============================================================ */

import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js';
import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js';
import {
  getFirestore, collection, doc, onSnapshot, runTransaction,
  setDoc, deleteDoc, getDocs, writeBatch, enableIndexedDbPersistence
} from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js';

/* ============================================================
   FIREBASE SETUP
   1. Go to https://console.firebase.google.com -> Add project
   2. In the project: Build > Firestore Database > Create database
      (start in production mode, pick a nearby region)
   3. Build > Authentication > Sign-in method > enable "Anonymous"
   4. Project settings (gear icon) > General > scroll to "Your apps"
      > Add app > Web (</>) > register it > copy the firebaseConfig
      object it gives you and paste it below, replacing the placeholder.
   5. In Firestore > Rules, paste:
        rules_version = '2';
        service cloud.firestore {
          match /databases/{database}/documents {
            match /{document=**} {
              allow read, write: if request.auth != null;
            }
          }
        }
      This means: anyone who opens this page (and is auto signed-in
      anonymously) can read/write. That's fine for a small internal
      team tool reached via an unlisted URL, but it is NOT a real
      access-control boundary -- anyone with the link and the URL
      could read or change the data. If that's ever a concern, this
      needs proper accounts + rules keyed to specific user IDs instead.
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyAk0hWoUTBnbGDhZYf77KEZVwGZAAzp_Tk",
  authDomain: "zidellomop.firebaseapp.com",
  projectId: "zidellomop",
  storageBucket: "zidellomop.firebasestorage.app",
  messagingSenderId: "618376962439",
  appId: "1:618376962439:web:b06fee2187c347cb487322"
};

const NAV = [
  {id:'dashboard', label:'Dashboard', short:'Board', icon:'grid'},
  {id:'refill', label:'Refill Stock', short:'Refill', icon:'box'},
  {id:'pack', label:'Pack a Batch', short:'Pack', icon:'stamp'},
  {id:'loose', label:'Loose Pieces', short:'Loose', icon:'layers'},
  {id:'dispatch', label:'Dispatch', short:'Dispatch', icon:'truck'},
  {id:'ledger', label:'Ledger', short:'Ledger', icon:'book'},
  {id:'settings', label:'Settings', short:'Settings', icon:'gear'}
];

const ICONS = {
  grid:'<path d="M3 3h7v7H3zM14 3h7v7h-7zM3 14h7v7H3zM14 14h7v7h-7z" fill="none" stroke="currentColor" stroke-width="1.6"/>',
  box:'<path d="M3 7l9-4 9 4-9 4-9-4zM3 7v10l9 4 9-4V7M12 11v10" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>',
  layers:'<path d="M12 3l9 5-9 5-9-5 9-5zM3 13l9 5 9-5M3 8l9 5 9-5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>',
  stamp:'<path d="M12 3a3 3 0 013 3c0 1.3-.7 2-1.5 2.7C14.6 9.3 15 10 15 11H9c0-1 .4-1.7 1.5-2.3C9.7 8 9 7.3 9 6a3 3 0 013-3zM5 15h14l1 6H4l1-6zM9 11h6v4H9z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>',
  truck:'<path d="M2 7h11v9H2zM13 10h4l3 3v3h-7zM6 20a2 2 0 100-4 2 2 0 000 4zM17 20a2 2 0 100-4 2 2 0 000 4z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>',
  book:'<path d="M4 4.5A2.5 2.5 0 016.5 2H20v18H6.5A2.5 2.5 0 004 17.5v-13zM4 17.5A2.5 2.5 0 016.5 15H20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>',
  gear:'<path d="M12 15a3 3 0 100-6 3 3 0 000 6z" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M19.4 13a7.4 7.4 0 000-2l2-1.6-2-3.4-2.4.6a7.5 7.5 0 00-1.7-1L14.8 3H9.2l-.5 2.6a7.5 7.5 0 00-1.7 1l-2.4-.6-2 3.4L4.6 11a7.4 7.4 0 000 2l-2 1.6 2 3.4 2.4-.6a7.5 7.5 0 001.7 1l.5 2.6h5.6l.5-2.6a7.5 7.5 0 001.7-1l2.4.6 2-3.4-2-1.6z" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>'
};

const TXN_LABELS = {
  refill_in:'Refill stock IN',
  pack:'Packed',
  loose_return:'Loose \u2192 Refill',
  dispatch:'Dispatched',
  adjustment:'Stock adjusted'
};

const CHALLAN_PREFIX = { refill:'MI', pack:'PK', loose:'LR', dispatch:'DC', adjust:'ADJ' };
function formatChallan(type, n){
  return CHALLAN_PREFIX[type] + '-' + String(n).padStart(4,'0');
}
// Atomically claims the next challan number for a type, inside an
// already-open Firestore transaction. Must be called during the READ
// phase (before any transaction.set/update/delete in that transaction),
// since it performs a transaction.get(). The caller is responsible for
// writing the returned counterRef/nextNum back with transaction.set()
// during the write phase -- this only computes the value, it doesn't
// persist it, so two concurrent transactions can never claim the same
// number (Firestore's transaction retry-on-conflict guarantees that).
async function claimChallanNumber(transaction, type){
  const counterRef = doc(db,'counters',type);
  const snap = await transaction.get(counterRef);
  const nextNum = (snap.exists() ? snap.data().last : 0) + 1;
  return { counterRef: counterRef, nextNum: nextNum, challanNo: formatChallan(type, nextNum) };
}

function defaultState(){
  return {
    meta:{ currentUser:'Operator', editWindowHours:24, companyName:'Royal Plastic' },
    rawMaterials:[],        // {id, name, pcsPerBag, createdAt} -- raw refill material, e.g. "Premium 16\""
    finishedProducts:[],    // {id, name, cartonSize, rawMaterialId, createdAt} -- packed output made from a raw material, e.g. "Premium 16\" Packed Refill"
    stock:{},               // rawMaterialId -> {refill, loose}
    finishedStock:{},       // finishedProductId -> {finished}
    transactions:[],       // full transaction records, voidable
    ledger:[],              // flattened lines for display: {id, txnId, ts, productId, area, delta, balanceAfter, reason, challanNo, user}
    materialInSheets:[],    // {id, date, challanNo, sheetTitle, receivedBy, verifiedBy, lines:[...], txnIds:[...], voided, editableUntil, createdAt}
    packingSheets:[],       // {id, date, challanNo, lines:[{rawMaterialId,finishedProductId,qty,cartonsProduced,looseProduced}], txnIds:[...], voided, editableUntil, createdAt}
    looseReturnSheets:[],   // {id, date, challanNo, lines:[{productId,qty}], txnIds:[...], voided, editableUntil, createdAt}
    dispatchSheets:[]       // {id, date, challanNo, destination, note, lines:[{productId,qty}], txnIds:[...], voided, editableUntil, createdAt}
  };
}

const App = {
  state: defaultState(),
  ui:{
    ready:false,
    connectionError:null,
    busy:false, // true while a sheet save/void is in flight -- blocks re-submission
    tab:'dashboard',
    refillMode:'list', // 'list' | 'new' | 'view'
    refillSheetForm:null,
    viewingRefillSheetId:null,
    packMode:'list',
    packSheetForm:null,
    viewingPackSheetId:null,
    looseMode:'list',
    looseSheetForm:null,
    viewingLooseSheetId:null,
    dispatchMode:'list',
    dispatchSheetForm:null,
    viewingDispatchSheetId:null,
    ledgerFilter:{area:'all', department:'all', productId:'', user:'all', from:'', to:'', q:''},
    reportFilter:{from:'', to:''}
  },
  actions:{}
};
// This script runs as an ES module (required for the Firebase imports above),
// which means its top-level consts/functions are NOT visible to inline
// onclick="..." HTML attributes -- those always execute in the plain global
// scope. Explicitly attach what the inline handlers need onto window.
window.App = App;
window.closeModal = closeModal;

/* ---------------- Firebase init + real-time listeners ---------------- */
const firebaseApp = initializeApp(firebaseConfig);
const auth = getAuth(firebaseApp);
const db = getFirestore(firebaseApp);
try{ enableIndexedDbPersistence(db); }catch(e){ /* multiple tabs open, or unsupported browser -- fine, just skip offline cache */ }

function attachListeners(){
  const flags = {rawMaterials:false, finishedProducts:false, stock:false, finishedStock:false, transactions:false, materialInSheets:false, packingSheets:false, looseReturnSheets:false, dispatchSheets:false, ledger:false, meta:false};
  function checkReady(){
    if(!App.ui.ready && Object.keys(flags).every(function(k){return flags[k];})){
      App.ui.ready = true;
    }
    render();
  }

  onSnapshot(collection(db,'rawMaterials'), function(snap){
    App.state.rawMaterials = snap.docs.map(function(d){return Object.assign({id:d.id}, d.data());});
    flags.rawMaterials = true; checkReady();
  }, function(err){ App.ui.connectionError = err.message; render(); });

  onSnapshot(collection(db,'finishedProducts'), function(snap){
    App.state.finishedProducts = snap.docs.map(function(d){return Object.assign({id:d.id}, d.data());});

/* ---------------- helpers ---------------- */
function uid(prefix){
  return prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2,7);
}
function escapeHtml(str){
  return String(str==null?'':str).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}
function fmtDateTime(ts){
  const d = new Date(ts);
  return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) + ' \u00b7 ' +
         d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}
function fmtDate(ts){
  const d = new Date(ts);
  return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
}
function timeAgo(ts){
  const s = Math.floor((Date.now()-ts)/1000);
  if(s<60) return 'just now';
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}
function rawMaterialName(id){
  const p = App.state.rawMaterials.find(x=>x.id===id);
  return p ? p.name : '\u2014';
}
function finishedProductName(id){
  const p = App.state.finishedProducts.find(x=>x.id===id);
  return p ? p.name : '\u2014';
}
// Ledger/transaction rows only store one productId, but which catalog it
// points into depends on the area: refill/loose live in raw materials,
// finished lives in finished products.
function productNameForArea(area, id){
  return area==='finished' ? finishedProductName(id) : rawMaterialName(id);
}
function finishedProductCartonSize(id){
  const p = App.state.finishedProducts.find(x=>x.id===id);
  return p ? (p.cartonSize||1) : 1;
}
function finishedProductsFor(rawMaterialId){
  return App.state.finishedProducts.filter(function(p){return p.rawMaterialId===rawMaterialId;});
}
function rawStockFor(rawMaterialId){
  // Read-only: App.state.stock is a live cache fed by a Firestore listener,
  // so this must never write into it -- just return a safe default when
  // a stock doc hasn't been created yet (or hasn't synced down).
  return App.state.stock[rawMaterialId] || {refill:0, loose:0};
}
function finishedStockFor(finishedProductId){
  return App.state.finishedStock[finishedProductId] || {finished:0};
}
function findSheetByTxnId(txnId){
  const sources = [
    {kind:'refill', list: App.state.materialInSheets},
    {kind:'pack', list: App.state.packingSheets},
    {kind:'loose', list: App.state.looseReturnSheets},
    {kind:'dispatch', list: App.state.dispatchSheets}
  ];
  for(const src of sources){
    const sheet = src.list.find(function(s){return s.txnIds && s.txnIds.indexOf(txnId)!==-1;});
    if(sheet) return {kind: src.kind, sheet: sheet};
  }
  return null;
}
function toast(msg, kind){
  const root = document.getElementById('toastRoot');
  const el = document.createElement('div');
  el.className = 'toast' + (kind ? ' '+kind : '');
  el.textContent = msg;
  root.appendChild(el);
  setTimeout(function(){ el.remove(); }, 3200);
}
function showStamp(text){
  const wrap = document.createElement('div');
  wrap.className = 'stamp-wrap';
  wrap.innerHTML = '<div class="stamp">'+escapeHtml(text)+'</div>';
  document.body.appendChild(wrap);
  setTimeout(function(){ wrap.remove(); }, 850);
}
function tag(code){ return '<span class="tag">'+escapeHtml(code)+'</span>'; }
function statCard(label, num, sub, kind){
  return '<div class="stat-card'+(kind?' '+kind:'')+'"><div class="eyebrow">'+label+'</div>' +
    '<div class="num">'+num+'</div><div class="sub">'+sub+'</div></div>';
}
function emptyState(title, msg, ctaLabel, ctaFn){
  return '<div class="empty"><div class="disp">'+escapeHtml(title)+'</div><p>'+escapeHtml(msg)+'</p>' +
    (ctaFn?'<button class="btn btn-primary btn-sm" onclick="'+ctaFn+'">'+escapeHtml(ctaLabel)+'</button>':'') + '</div>';
}
function todayISO(){
  const d = new Date();
  const off = d.getTimezoneOffset();
  return new Date(d.getTime() - off*60000).toISOString().slice(0,10);
}
function newEmptyLine(){
  return {mode:'single', productId:'', pcsPerBag:'', bags:'', productIdB:'', qtyA:'', qtyB:''};
}
function newSheetForm(){
  return {
    date: todayISO(),
    sheetTitle: App.state.meta.lastSheetTitle || '',
    receivedBy: App.state.meta.currentUser || '',
    verifiedBy: '',
    lines: [newEmptyLine()]
  };
}
function linePcsPerBag(line){
  if(line.mode==='mix') return (Number(line.qtyA)||0) + (Number(line.qtyB)||0);
  return Number(line.pcsPerBag)||0;
}
function lineTotal(line){
  if(line.mode==='mix'){
    const qtyA = Number(line.qtyA)||0, qtyB = Number(line.qtyB)||0;
    return (qtyA+qtyB) * (Number(line.bags)||0);
  }
  return (Number(line.pcsPerBag)||0) * (Number(line.bags)||0);
}
function lineLabel(line){
  if(line.mode==='mix'){
    return escapeHtml(rawMaterialName(line.productId))+' ('+(Number(line.qtyA)||0)+') '+escapeHtml(rawMaterialName(line.productIdB))+' ('+(Number(line.qtyB)||0)+') \u2014 Mix';
  }
  return escapeHtml(rawMaterialName(line.productId));
}
function lineValid(line){
  if(line.mode==='mix'){
    return line.productId && line.productIdB && line.productId!==line.productIdB &&
      (Number(line.qtyA)>0 || Number(line.qtyB)>0) && Number(line.bags)>0;
  }
  return line.productId && Number(line.pcsPerBag)>0 && Number(line.bags)>0;
}

/* ---------------- pure data builders (no side effects -- used inside Firestore transactions) ---------------- */
function editWindowMs(){
  return Number(App.state.meta.editWindowHours || 24) * 3600 * 1000;
}
/* Void window is computed dynamically from the record's creation time plus
   the CURRENT Settings value -- not the frozen editableUntil stored on the
   record. This way, raising the window in Settings retroactively re-opens
   older entries for voiding (and lowering it closes them sooner). */
function voidWindowOpen(rec){
  const base = rec.createdAt || rec.ts || 0;
  return Date.now() < base + editWindowMs();
}
function buildTxnData(type, productId, challanNo, note, ts, extra){
  return Object.assign({
    type: type, productId: productId, challanNo: challanNo, note: note||'',
    ts: ts, user: App.state.meta.currentUser||'Operator',
    editableUntil: Date.now() + editWindowMs(),
    voided:false
  }, extra||{});
}
function buildLedgerData(txnId, ts, productId, area, delta, balanceAfter, reason, challanNo, user){
  return {
    txnId: txnId, ts: ts, productId: productId, area: area,
    delta: delta, balanceAfter: balanceAfter, reason: reason,
    challanNo: challanNo, user: user
  };
}

function render(){
  // Preserve whatever the user is currently typing into, since every
  // state change re-renders the view by replacing innerHTML (which
  // would otherwise destroy the focused element and drop keyboard focus
  // after every single keystroke).
  //
  // NOTE: type="number" inputs do not reliably support selectionStart /
  // setSelectionRange in browsers (Chrome throws or returns 0 for them),
  // so cursor-position restoration is only attempted for text-like
  // fields. For number inputs we still restore focus, just not the
  // cursor position -- trying to do so previously caused the cursor to
  // snap to position 0 after every keystroke, which made new digits get
  // inserted at the *front* of the value instead of the end.
  const active = document.activeElement;
  let focusId = null, selStart = null, selEnd = null;
  if(active && active.id){
    focusId = active.id;
    const type = (active.tagName === 'TEXTAREA') ? 'textarea' : (active.type || '');
    if(type==='text' || type==='textarea' || type==='search' || type==='tel' || type==='url'){
      try{ selStart = active.selectionStart; selEnd = active.selectionEnd; }catch(e){}
    }
  }

  renderNav();
  const view = document.getElementById('view');

  if(App.ui.connectionError){
    view.innerHTML = '<div class="empty"><div class="disp">Can\'t connect to the cloud</div>' +
      '<p>'+escapeHtml(App.ui.connectionError)+'</p>' +
      '<p style="margin-top:6px;">Check the Firebase config in Settings &gt; Data, and that Firestore + Anonymous sign-in are enabled in the Firebase console.</p></div>';
    return;
  }
  if(!App.ui.ready){
    view.innerHTML = '<div class="empty"><div class="disp">Connecting to cloud\u2026</div><p>Loading shared factory data.</p></div>';
    return;
  }

  const fn = {
    dashboard: viewDashboard,
    refill: viewRefill,
    pack: viewPack,
    loose: viewLoose,
    dispatch: viewDispatch,
    ledger: viewLedger,
    settings: viewSettings
  }[App.ui.tab];
  view.innerHTML = fn();

  if(focusId){
    const el = document.getElementById(focusId);
    if(el){
      el.focus();
      if(selStart !== null && el.setSelectionRange){
        try{ el.setSelectionRange(selStart, selEnd); }catch(e){}
      }
    }
  }
}

/* ================= DASHBOARD ================= */
function productNameForTxn(t){
  return (t.type==='refill_in' || t.type==='loose_return' || t.type==='adjustment') ? rawMaterialName(t.productId) : finishedProductName(t.productId);
}
function viewDashboard(){
  const s = App.state;
  let totalRefill=0, totalLoose=0, totalFinished=0;
  s.rawMaterials.forEach(function(p){
    const st = rawStockFor(p.id);
    totalRefill += st.refill; totalLoose += st.loose;
  });
  s.finishedProducts.forEach(function(p){
    totalFinished += finishedStockFor(p.id).finished;
  });
  const todayStart = new Date(); todayStart.setHours(0,0,0,0);
  const dispatchesToday = s.transactions.filter(function(t){return t.type==='dispatch' && !t.voided && t.ts>=todayStart.getTime();}).length;

  let html = '<div class="grid grid-stats">' +
    statCard('Raw material on hand', totalRefill+' pcs', s.rawMaterials.length+' raw material(s)', '') +
    statCard('Loose pieces pending', totalLoose+' pcs', totalLoose>0?'awaiting return or top-up':'none pending', totalLoose>0?'warn':'good') +
    statCard('Finished goods ready', totalFinished+' cartons', s.finishedProducts.length+' finished product(s)', 'good') +
    statCard('Dispatches today', dispatchesToday, 'challans issued', '') +
  '</div>';

  if(!s.rawMaterials.length && !s.finishedProducts.length){
    html += emptyState('No products set up yet', 'Add your raw materials and finished products in Settings to get started.', 'Go to Settings', "App.actions.nav('settings')");
    return html;
  }

  html += '<div class="section-head"><h2>Raw materials</h2></div>';
  if(!s.rawMaterials.length){
    html += emptyState('No raw materials yet', 'Add a raw material in Settings first.', 'Go to Settings', "App.actions.nav('settings')");
  } else {
    html += '<div class="tbl-wrap" style="margin-bottom:24px;"><table><thead><tr><th>Raw material</th><th>Refill</th><th>Loose</th></tr></thead><tbody>' +
      s.rawMaterials.map(function(p){
        const st = rawStockFor(p.id);
        return '<tr><td>'+escapeHtml(p.name)+'</td><td class="mono">'+st.refill+'</td><td class="mono">'+st.loose+'</td></tr>';
      }).join('') + '</tbody></table></div>';
  }

  html += '<div class="section-head"><h2>Finished products</h2></div>';
  if(!s.finishedProducts.length){
    html += emptyState('No finished products yet', 'Add a finished product in Settings first (packed from a raw material).', 'Go to Settings', "App.actions.nav('settings')");
  } else {
    html += '<div class="tbl-wrap" style="margin-bottom:24px;"><table><thead><tr><th>Finished product</th><th>Made from</th><th>Carton size</th><th>Finished (cartons)</th></tr></thead><tbody>' +
      s.finishedProducts.map(function(p){
        return '<tr><td>'+escapeHtml(p.name)+'</td><td>'+escapeHtml(rawMaterialName(p.rawMaterialId))+'</td><td class="mono">'+p.cartonSize+'</td>' +
          '<td class="mono">'+finishedStockFor(p.id).finished+'</td></tr>';
      }).join('') + '</tbody></table></div>';
  }

  const recent = s.transactions.slice().sort(function(a,b){return b.ts-a.ts;}).slice(0,10);
  html += '<div class="section-head"><h2>Recent activity</h2></div>';
  if(!recent.length){
    html += emptyState('No activity yet', 'Receive some refill stock to get started.', 'Receive stock', "App.actions.nav('refill')");
  } else {
    const viewActionByKind = {refill:'refillViewSheet', pack:'packViewSheet', loose:'looseViewSheet', dispatch:'dispatchViewSheet'};
    html += '<div class="tbl-wrap"><table><thead><tr><th>Type</th><th>Product</th><th>Challan</th><th>When</th><th>By</th><th></th></tr></thead><tbody>' +
      recent.map(function(t){
        const found = findSheetByTxnId(t.id);
        const actionCell = found ? '<button class="btn btn-ghost btn-sm" onclick="App.actions.'+viewActionByKind[found.kind]+'(\''+found.sheet.id+'\')">View sheet</button>' : '';
        return '<tr><td>'+TXN_LABELS[t.type]+(t.voided?' <span class="pill pill-neutral">voided</span>':'')+'</td>' +
          '<td>'+escapeHtml(productNameForTxn(t))+'</td>' +
          '<td>'+tag(t.challanNo)+'</td>' +
          '<td>'+timeAgo(t.ts)+'</td>' +
          '<td>'+escapeHtml(t.user)+'</td>' +
          '<td>'+actionCell+'</td></tr>';
      }).join('') + '</tbody></table></div>';
  }
  return html;
}

function newPackSheetForm(){
  return { date: todayISO(), lines: [{finishedProductId:'', qty:''}] };
}
function finishedProductOptionsPlain(selectedId){
  return App.state.finishedProducts.map(function(p){
    return '<option value="'+p.id+'"'+(selectedId===p.id?' selected':'')+'>'+escapeHtml(p.name)+'</option>';
  }).join('');
}
function packLineRawMaterialId(line){
  const fp = App.state.finishedProducts.find(function(x){return x.id===line.finishedProductId;});
  return fp ? fp.rawMaterialId : '';
}
function packLineCartonSize(line){
  return line.finishedProductId ? finishedProductCartonSize(line.finishedProductId) : 0;
}
function packLineCartons(line){
  const size = packLineCartonSize(line);
  const qty = Number(line.qty)||0;
  return size ? Math.floor(qty/size) : 0;
}
function packLineLoose(line){
  const size = packLineCartonSize(line);
  const qty = Number(line.qty)||0;
  return size ? (qty % size) : 0;
}
function packLineReservedBySiblings(i){
  const f = App.ui.packSheetForm;
  const line = f.lines[i];
  const rawId = packLineRawMaterialId(line);
  if(!rawId) return 0;
  let reserved = 0;
  for(let j=0;j<i;j++){
    if(packLineRawMaterialId(f.lines[j]) === rawId) reserved += Number(f.lines[j].qty)||0;
  }
  return reserved;
}
function renderPackLineRow(line, i){
  const rawId = packLineRawMaterialId(line);
  const cartonSize = packLineCartonSize(line);
  const qty = Number(line.qty)||0;
  const rawBalance = rawId ? rawStockFor(rawId).refill : 0;
  const reserved = line.finishedProductId ? packLineReservedBySiblings(i) : 0;
  const availBalance = rawBalance - reserved;
  let html = '<div class="card" style="margin-bottom:10px;">' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">' +
    '<div class="eyebrow">Line '+(i+1)+'</div>' +
    '<button class="row-x" onclick="App.actions.packRemoveLine('+i+')" title="Remove line">&times;</button></div>' +
    '<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;">' +
    '<div class="field" style="margin-bottom:0;"><label>Finished product</label><select onchange="App.actions.packLineSetField('+i+',\'finishedProductId\',this.value)">' +
    '<option value="">Select\u2026</option>' + finishedProductOptionsPlain(line.finishedProductId) + '</select></div>' +
    '<div class="field" style="margin-bottom:0;"><label>Quantity to pack (raw pcs)</label>' +
    '<input id="packline_'+i+'_qty" type="text" inputmode="numeric" pattern="[0-9]*" class="mono" value="'+escapeHtml(line.qty)+'" oninput="App.actions.packLineSetField('+i+',\'qty\',this.value)"></div>' +
    '</div>';
  if(line.finishedProductId){
    const short = qty > availBalance;
    html += '<div class="hint" style="margin-top:8px;">Made from raw material: <strong>'+escapeHtml(rawMaterialName(rawId))+'</strong></div>';
    html += '<div class="balance-hint" style="margin-top:6px;'+(short?'border-color:var(--alert);color:var(--alert);':'')+'">Refill balance: <strong style="margin-left:4px;">'+availBalance+' pcs</strong> \u00b7 carton size: '+cartonSize+' pcs'+(short?' \u2014 not enough stock':'')+'</div>';
    if(reserved>0){
      html += '<div class="hint" style="margin-top:4px;">'+rawBalance+' pcs in stock \u2014 '+reserved+' pcs already claimed by earlier line(s) using this raw material in this sheet</div>';
    }
    if(qty>0){
      html += '<div class="hint" style="margin-top:6px;">= <strong>'+packLineCartons(line)+'</strong> carton(s) + <strong>'+packLineLoose(line)+'</strong> loose piece(s) \u2014 loose returns to '+escapeHtml(rawMaterialName(rawId))+' raw stock</div>';
    }
  }
  html += '</div>';
  return html;
}

    '<button class="btn btn-primary" onclick="App.actions.packNewSheet()">+ New packing sheet (Step 2)</button></div>';

  const qty = Number(line.qty)||0;
  let html = '<div class="card" style="margin-bottom:10px;">' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">' +
    '<div class="eyebrow">Line '+(i+1)+'</div>' +
    '<button class="row-x" onclick="App.actions.dispatchRemoveLine('+i+')" title="Remove line">&times;</button></div>' +
    '<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;">' +
    '<div class="field" style="margin-bottom:0;"><label>Finished product</label><select onchange="App.actions.dispatchLineSetField('+i+',\'productId\',this.value)">' +
    '<option value="">Select\u2026</option>' + finishedProductOptionsPlain(line.productId) + '</select></div>' +
    '<div class="field" style="margin-bottom:0;"><label>Cartons to dispatch</label>' +
    '<input id="dispatchline_'+i+'_qty" type="text" inputmode="numeric" pattern="[0-9]*" class="mono" value="'+escapeHtml(line.qty)+'" oninput="App.actions.dispatchLineSetField('+i+',\'qty\',this.value)"></div>' +
    '</div>';
  if(line.productId){
    const short = qty > (st?st.finished:0);
    html += '<div class="balance-hint" style="margin-top:10px;'+(short?'border-color:var(--alert);color:var(--alert);':'')+'">Finished goods: <strong style="margin-left:4px;">'+(st?st.finished:0)+' cartons</strong>'+(short?' \u2014 not enough stock':'')+'</div>';
  }
  html += '</div>';
  return html;
}
function viewDispatchList(){
  const s = App.state;
  let html = '<div class="section-head"><h2>Dispatch</h2>' +
    '<button class="btn btn-primary" onclick="App.actions.dispatchNewSheet()">+ New dispatch (Step 3)</button></div>';
  if(!s.finishedProducts.length){
    return html + emptyState('No finished products yet', 'Add a finished product in Settings first (packed from a raw material).', 'Go to Settings', "App.actions.nav('settings')");
  }
  html += '<div class="tbl-wrap" style="margin-bottom:24px;"><table><thead><tr><th>Finished product</th><th>Finished goods (ready)</th></tr></thead><tbody>' +
    s.finishedProducts.map(function(p){
      return '<tr><td>'+escapeHtml(p.name)+'</td><td class="mono">'+finishedStockFor(p.id).finished+' cartons</td></tr>';
    }).join('') + '</tbody></table></div>';

  const f = App.ui.reportFilter;
  let dispatches = s.transactions.filter(function(t){return t.type==='dispatch';}).sort(function(a,b){return b.ts-a.ts;});
  if(f.from) dispatches = dispatches.filter(function(t){return t.ts >= new Date(f.from).getTime();});
  if(f.to) dispatches = dispatches.filter(function(t){return t.ts <= new Date(f.to).getTime()+86399999;});
  const totalCartons = dispatches.filter(function(t){return !t.voided;}).reduce(function(a,t){return a+t.qty;},0);

  html += '<div class="section-head"><h2>Dispatch report</h2>' +
    '<button class="btn btn-ghost btn-sm" onclick="window.print()">Print</button></div>';
  html += '<div class="card" style="display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:14px;">' +
    '<div class="field" style="margin-bottom:0;"><label>From</label><input type="date" value="'+escapeHtml(f.from)+'" onchange="App.actions.reportSetFrom(this.value)"></div>' +
    '<div class="field" style="margin-bottom:0;"><label>To</label><input type="date" value="'+escapeHtml(f.to)+'" onchange="App.actions.reportSetTo(this.value)"></div>' +
    '<div class="hint" style="margin-bottom:9px;">Total dispatched in range: <strong class="mono">'+totalCartons+' cartons</strong></div>' +
    '<button class="btn btn-ghost btn-sm" style="margin-bottom:0;" onclick="App.actions.exportDispatchCSV()">Export CSV</button>' +
    '</div>';

  if(!dispatches.length){
    html += emptyState('No dispatches yet', 'Dispatch a batch of complete cartons to see the report here.', '', '');
  } else {
    html += '<div class="tbl-wrap"><table><thead><tr><th>Date</th><th>Challan</th><th>Product</th><th>Cartons</th><th>Destination</th><th>Note</th><th></th></tr></thead><tbody>' +
      dispatches.map(function(t){
        const found = findSheetByTxnId(t.id);
        return '<tr><td>'+fmtDate(t.ts)+'</td><td>'+tag(t.challanNo)+(t.voided?' <span class="pill pill-neutral">voided</span>':'')+'</td>' +
          '<td>'+escapeHtml(finishedProductName(t.productId))+'</td><td class="mono">'+t.qty+'</td>' +
          '<td>'+escapeHtml(t.destination||'\u2014')+'</td><td>'+escapeHtml(t.note||'\u2014')+'</td>' +
          '<td style="white-space:nowrap;">'+(found?'<button class="btn btn-ghost btn-sm" onclick="App.actions.dispatchViewSheet(\''+found.sheet.id+'\')">View</button> '+sheetVoidBtn(found.sheet,'dispatchVoidSheet'):'')+'</td></tr>';
      }).join('') + '</tbody></table></div>';
  }
  return html;
}

/* ================= LEDGER (all areas) ================= */
function ledgerTxnTypeMap(){
  const map = {};
  App.state.transactions.forEach(function(t){ map[t.id] = t.type; });
  return map;
}
function ledgerRowDepartment(r, txnTypeMap){
  if(r.reason && r.reason.indexOf('Void')===0) return 'void';
  const type = txnTypeMap[r.txnId];
  if(type==='refill_in') return 'refill';
  if(type==='pack') return 'pack';
  if(type==='loose_return') return 'loose';
  if(type==='dispatch') return 'dispatch';
  if(type==='adjustment') return 'adjust';
  return 'other';
}
const LEDGER_DEPARTMENT_LABELS = {refill:'Refill Stock', pack:'Pack', loose:'Loose Pieces', dispatch:'Dispatch', adjust:'Adjustment', void:'Voided / reversal', other:'Other'};
function ledgerProductOptions(selectedId){
  let html = '';
  if(App.state.rawMaterials.length){
    html += '<optgroup label="Raw materials">' + App.state.rawMaterials.map(function(p){
      return '<option value="'+p.id+'"'+(p.id===selectedId?' selected':'')+'>'+escapeHtml(p.name)+'</option>';
    }).join('') + '</optgroup>';
  }
  if(App.state.finishedProducts.length){
    html += '<optgroup label="Finished products">' + App.state.finishedProducts.map(function(p){
      return '<option value="'+p.id+'"'+(p.id===selectedId?' selected':'')+'>'+escapeHtml(p.name)+'</option>';
    }).join('') + '</optgroup>';
  }
  return html;
}
function ledgerUserOptions(selectedUser){
  const users = App.state.ledger.reduce(function(arr,r){ if(r.user && arr.indexOf(r.user)===-1) arr.push(r.user); return arr; }, []);
  users.sort();
  return users.map(function(u){ return '<option value="'+escapeHtml(u)+'"'+(u===selectedUser?' selected':'')+'>'+escapeHtml(u)+'</option>'; }).join('');
}
function filteredLedgerRows(){
  const f = App.ui.ledgerFilter;
  const txnTypeMap = ledgerTxnTypeMap();
  let rows = App.state.ledger.slice().sort(function(a,b){return b.ts-a.ts;});
  if(f.area !== 'all') rows = rows.filter(function(r){return r.area===f.area;});
  if(f.department !== 'all') rows = rows.filter(function(r){return ledgerRowDepartment(r, txnTypeMap)===f.department;});
  if(f.productId) rows = rows.filter(function(r){return r.productId===f.productId;});
  if(f.user !== 'all') rows = rows.filter(function(r){return r.user===f.user;});
  if(f.from) rows = rows.filter(function(r){return r.ts >= new Date(f.from).getTime();});
  if(f.to) rows = rows.filter(function(r){return r.ts <= new Date(f.to).getTime()+86399999;});
  if(f.q){
    const q = f.q.toLowerCase();
    rows = rows.filter(function(r){return (productNameForArea(r.area, r.productId)+' '+r.challanNo+' '+r.reason).toLowerCase().includes(q);});
  }
  return rows;
}
function ledgerTable(rows){
  const txnTypeMap = ledgerTxnTypeMap();
  return '<div class="tbl-wrap"><table><thead><tr><th>When</th><th>Product</th><th>Department</th><th class="mono" style="text-align:right;">In</th><th class="mono" style="text-align:right;">Out</th><th class="mono" style="text-align:right;">Balance</th><th>Reason</th><th>Challan</th><th>By</th></tr></thead><tbody>' +
    rows.map(function(r){
      const inQty = r.delta>0 ? r.delta : null;
      const outQty = r.delta<0 ? -r.delta : null;
      return '<tr><td>'+fmtDateTime(r.ts)+'</td><td>'+escapeHtml(productNameForArea(r.area, r.productId))+'</td>' +
        '<td>'+escapeHtml(LEDGER_DEPARTMENT_LABELS[ledgerRowDepartment(r, txnTypeMap)])+'</td>' +
        '<td class="mono delta-pos" style="text-align:right;">'+(inQty!==null?'+'+inQty:'\u2014')+'</td>' +
        '<td class="mono delta-neg" style="text-align:right;">'+(outQty!==null?'\u2212'+outQty:'\u2014')+'</td>' +
        '<td class="mono" style="text-align:right;font-weight:600;">'+r.balanceAfter+'</td><td>'+escapeHtml(r.reason)+'</td>' +
        '<td>'+tag(r.challanNo)+'</td><td>'+escapeHtml(r.user)+'</td></tr>';
    }).join('') + '</tbody></table></div>';
}
function ledgerSummary(rows){
  let totalIn = 0, totalOut = 0;
  rows.forEach(function(r){ if(r.delta>0) totalIn += r.delta; else totalOut += -r.delta; });
  const net = totalIn - totalOut;
  return '<div class="card" style="display:flex;gap:24px;flex-wrap:wrap;margin-bottom:14px;padding:14px 16px;">' +
    '<div><div class="eyebrow">Total In</div><div class="disp delta-pos" style="font-size:20px;">+'+totalIn+'</div></div>' +
    '<div><div class="eyebrow">Total Out</div><div class="disp delta-neg" style="font-size:20px;">\u2212'+totalOut+'</div></div>' +
    '<div><div class="eyebrow">Net</div><div class="disp" style="font-size:20px;'+(net>=0?'':'color:var(--alert);')+'">'+(net>=0?'+':'\u2212')+Math.abs(net)+'</div></div>' +
    '<div><div class="eyebrow">Entries</div><div class="disp" style="font-size:20px;">'+rows.length+'</div></div>' +
    '</div>';
}
function viewLedger(){
  const f = App.ui.ledgerFilter;
  const rows = filteredLedgerRows();

  let html = '<div class="section-head"><h2>Full stock ledger</h2></div>';
  html += '<div class="card" style="display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:14px;padding:12px 16px;">' +
    '<div class="field" style="margin-bottom:0;"><label>From</label><input type="date" value="'+escapeHtml(f.from)+'" onchange="App.actions.ledgerFilterFrom(this.value)"></div>' +
    '<div class="field" style="margin-bottom:0;"><label>To</label><input type="date" value="'+escapeHtml(f.to)+'" onchange="App.actions.ledgerFilterTo(this.value)"></div>' +
    '<div class="field" style="margin-bottom:0;"><label>Department</label><select onchange="App.actions.ledgerFilterDepartment(this.value)">' +
    '<option value="all">All departments</option>' +
    Object.keys(LEDGER_DEPARTMENT_LABELS).map(function(k){return '<option value="'+k+'"'+(f.department===k?' selected':'')+'>'+LEDGER_DEPARTMENT_LABELS[k]+'</option>';}).join('') +
    '</select></div>' +
    '<div class="field" style="margin-bottom:0;"><label>Stock area</label><select onchange="App.actions.ledgerFilterArea(this.value)">' +
    '<option value="all"'+(f.area==='all'?' selected':'')+'>All areas</option>' +
    '<option value="refill"'+(f.area==='refill'?' selected':'')+'>Refill</option>' +
    '<option value="finished"'+(f.area==='finished'?' selected':'')+'>Finished goods</option>' +
    '<option value="loose"'+(f.area==='loose'?' selected':'')+'>Loose pieces</option>' +
    '</select></div>' +
    '<div class="field" style="margin-bottom:0;"><label>Product</label><select onchange="App.actions.ledgerFilterProduct(this.value)">' +
    '<option value="">All products</option>' + ledgerProductOptions(f.productId) + '</select></div>' +
    '<div class="field" style="margin-bottom:0;"><label>By</label><select onchange="App.actions.ledgerFilterUser(this.value)">' +
    '<option value="all">Everyone</option>' + ledgerUserOptions(f.user==='all'?'':f.user) + '</select></div>' +
    '<div class="field" style="margin-bottom:0;flex:1;min-width:180px;"><label>Search</label>' +
    '<input id="ledgerSearchBox" placeholder="Product / challan / reason\u2026" value="'+escapeHtml(f.q||'')+'" oninput="App.actions.ledgerSearch(this.value)"></div>' +
    '<button class="btn btn-ghost btn-sm" onclick="App.actions.ledgerFilterReset()">Reset filters</button>' +
    '<button class="btn btn-ghost btn-sm" onclick="App.actions.exportLedgerCSV()">Export CSV</button>' +
    '</div>';

  if(!rows.length){
    html += emptyState('No matching ledger entries', 'Try widening your filters, or clear them with Reset.', '', '');
    return html;
  }
  html += ledgerSummary(rows);
  html += ledgerTable(rows);
  return html;
}

App.actions.addRawMaterial = async function(){
  const name = document.getElementById('newRawName').value.trim();
  const pcsPerBag = Number(document.getElementById('newRawPcsBag').value) || null;
  if(!name) return toast('Enter a raw material name', 'err');

App.actions.refillSubmitSheet = async function(){
  if(App.ui.busy) return;
  const f = App.ui.refillSheetForm;
  if(!f.date) return toast('Select a date', 'err');
  const validLines = f.lines.filter(lineValid);
  if(!validLines.length) return toast('Add at least one valid line item', 'err');

  const ts = new Date(f.date+'T12:00:00').getTime() || Date.now();

  // Flatten lines into individual per-product credits (a mix line becomes two credits)
  const credits = [];
  validLines.forEach(function(line){
    if(line.mode==='mix'){
      const qtyA = (Number(line.qtyA)||0) * (Number(line.bags)||0);
      const qtyB = (Number(line.qtyB)||0) * (Number(line.bags)||0);
      if(qtyA>0) credits.push({productId: line.productId, qty: qtyA, note: 'Mix bag with '+rawMaterialName(line.productIdB)});
      if(qtyB>0) credits.push({productId: line.productIdB, qty: qtyB, note: 'Mix bag with '+rawMaterialName(line.productId)});
    } else {
      const qty = (Number(line.pcsPerBag)||0) * (Number(line.bags)||0);
      credits.push({productId: line.productId, qty: qty, note: ''});
    }
  });

  const uniqueProductIds = credits.reduce(function(arr,c){ if(arr.indexOf(c.productId)===-1) arr.push(c.productId); return arr; }, []);
  const sheetRef = doc(collection(db,'materialInSheets'));
  const txnRefs = credits.map(function(){ return doc(collection(db,'transactions')); });
  const ledgerRefs = credits.map(function(){ return doc(collection(db,'ledger')); });
  const stockRefs = {};
  uniqueProductIds.forEach(function(pid){ stockRefs[pid] = doc(db,'stock',pid); });

  App.ui.busy = true;
  render();
  try{
    let assignedChallan = '';
    await runTransaction(db, async function(transaction){
      // READS first (Firestore transactions require all gets before any writes)
      const claim = await claimChallanNumber(transaction, 'refill');
      const challanNo = claim.challanNo;

      const stockData = {};
      for(const pid of uniqueProductIds){
        const snap = await transaction.get(stockRefs[pid]);
        stockData[pid] = snap.exists() ? snap.data() : {refill:0, loose:0};
      }

      // Apply credits in order, tracking a running balance per product so
      // each ledger line's balanceAfter is correct even when two lines on
      // this sheet touch the same product.
      const running = {};
      uniqueProductIds.forEach(function(pid){ running[pid] = stockData[pid].refill; });

      const txnIds = [];
      credits.forEach(function(c, i){
        running[c.productId] += c.qty;
        const txnData = buildTxnData('refill_in', c.productId, challanNo, c.note, ts, {qty: c.qty});
        transaction.set(txnRefs[i], txnData);
        txnIds.push(txnRefs[i].id);
        transaction.set(ledgerRefs[i], buildLedgerData(txnRefs[i].id, ts, c.productId, 'refill', c.qty, running[c.productId], 'Refill stock IN', challanNo, txnData.user));
      });

      uniqueProductIds.forEach(function(pid){
        transaction.set(stockRefs[pid], Object.assign({}, stockData[pid], {refill: running[pid]}));
      });

      transaction.set(sheetRef, {
        date: f.date, challanNo: challanNo, sheetTitle: f.sheetTitle||'',
        receivedBy: f.receivedBy||'', verifiedBy: f.verifiedBy||'',
        lines: validLines, txnIds: txnIds,
        voided:false, createdAt: Date.now(),
        editableUntil: Date.now() + editWindowMs()
      });
      transaction.set(claim.counterRef, {last: claim.nextNum});
      assignedChallan = challanNo;
    });

    if(f.sheetTitle) setDoc(doc(db,'meta','settings'), {lastSheetTitle: f.sheetTitle}, {merge:true}).catch(function(){});

    App.ui.viewingRefillSheetId = sheetRef.id;
    App.ui.refillMode = 'view';
    App.ui.busy = false;
    toast('Sheet saved as '+assignedChallan, 'ok');
    render();
  }catch(e){
    App.ui.busy = false;
    toast('Failed to save sheet: '+e.message, 'err');
    render();
  }
};

App.actions.refillVoidSheet = async function(sheetId){
  const sheetRef = doc(db,'materialInSheets',sheetId);
  const cached = App.state.materialInSheets.find(function(s){return s.id===sheetId;});
  if(!cached) return;
  if(cached.voided) return toast('Already voided', 'err');
  if(!voidWindowOpen(cached)) return toast('Void window has passed for this sheet', 'err');
  if(!confirm('Void this entire material-in sheet (Challan '+cached.challanNo+')? This reverses all line credit(s).')) return;

  try{
    await runTransaction(db, async function(transaction){
      const sheetSnap = await transaction.get(sheetRef);
      if(!sheetSnap.exists()) throw new Error('Sheet not found');
      const sheet = sheetSnap.data();
      if(sheet.voided) throw new Error('Already voided');
      if(!voidWindowOpen(sheet)) throw new Error('Void window has passed for this sheet');

      const txnRefs = sheet.txnIds.map(function(id){ return doc(db,'transactions',id); });
      const txnSnaps = [];
      for(const ref of txnRefs){ txnSnaps.push(await transaction.get(ref)); }

      const uniqueProductIds = [];
      txnSnaps.forEach(function(s){ if(s.exists()){ const pid=s.data().productId; if(uniqueProductIds.indexOf(pid)===-1) uniqueProductIds.push(pid); } });
      const stockRefs = {}; const stockData = {};
      for(const pid of uniqueProductIds){
        stockRefs[pid] = doc(db,'stock',pid);
        const snap = await transaction.get(stockRefs[pid]);
        stockData[pid] = snap.exists() ? snap.data() : {refill:0, loose:0};
      }

      // Guard + compute: walk every txn once, tracking the running balance
      // per product step-by-step (so each ledger line's balanceAfter is
      // correct even if two lines in this sheet touch the same product).
      // Throwing here aborts before any writes are issued -- safe.
      const running = {};
      uniqueProductIds.forEach(function(pid){ running[pid] = stockData[pid].refill; });
      const reversalSteps = []; // {txnRef, ledgerRef, productId, qty, balanceAfter}
      txnSnaps.forEach(function(s, i){
        if(!s.exists()) return;
        const t = s.data();
        if(t.voided) return;
        running[t.productId] -= t.qty;
        if(running[t.productId] < 0) throw new Error('Cannot void \u2014 stock from "'+rawMaterialName(t.productId)+'" in this sheet has already been used');
        reversalSteps.push({txnRef: txnRefs[i], productId: t.productId, qty: t.qty, balanceAfter: running[t.productId]});
      });

      // All clear -- write the reversal.
      reversalSteps.forEach(function(step){
        transaction.update(step.txnRef, {voided:true});
        const ledgerRef = doc(collection(db,'ledger'));
        transaction.set(ledgerRef, buildLedgerData(step.txnRef.id, Date.now(), step.productId, 'refill', -step.qty, step.balanceAfter, 'Void \u2014 Sheet Challan '+sheet.challanNo, sheet.challanNo, App.state.meta.currentUser||'Operator'));
      });
      uniqueProductIds.forEach(function(pid){
        transaction.set(stockRefs[pid], Object.assign({}, stockData[pid], {refill: running[pid]}));
      });
      transaction.update(sheetRef, {voided:true});
    });
    toast('Sheet voided', 'ok');
  }catch(e){
    toast(e.message || 'Failed to void sheet', 'err');
  }
};

App.actions.adjustSubmit = async function(){
  if(App.ui.busy) return;
  const productId = document.getElementById('adjProductId').value;
  const direction = document.getElementById('adjDirection').value;
  const qtyRaw = Number(document.getElementById('adjQty').value);
  const reason = document.getElementById('adjReason').value.trim();
  if(!productId) return toast('Select a raw material', 'err');
  if(!qtyRaw || qtyRaw<1) return toast('Enter a valid quantity', 'err');
  if(!reason) return toast('Enter a reason \u2014 required for the record', 'err');
  const delta = direction==='remove' ? -qtyRaw : qtyRaw;

  const txnRef = doc(collection(db,'transactions'));
  const stockRef = doc(db,'stock',productId);
  const ts = Date.now();

  App.ui.busy = true;
  try{
    let assignedRef = '';
    await runTransaction(db, async function(transaction){
      const claim = await claimChallanNumber(transaction, 'adjust');
      const challanNo = claim.challanNo;
      const snap = await transaction.get(stockRef);
      const st = snap.exists() ? snap.data() : {refill:0, loose:0};
      const newRefill = st.refill + delta;
      if(newRefill < 0) throw new Error('Cannot remove '+qtyRaw+' pcs \u2014 only '+st.refill+' pcs in refill stock');

      const txnData = buildTxnData('adjustment', productId, challanNo, reason, ts, {qty: delta});
      transaction.set(txnRef, txnData);
      transaction.set(stockRef, {refill: newRefill, loose: st.loose});
      transaction.set(doc(collection(db,'ledger')), buildLedgerData(txnRef.id, ts, productId, 'refill', delta, newRefill, 'Adjustment \u2014 '+reason, challanNo, txnData.user));
      transaction.set(claim.counterRef, {last: claim.nextNum});
      assignedRef = challanNo;
    });
    App.ui.busy = false;
    closeModal();
    toast('Adjustment saved as '+assignedRef, 'ok');
    render();

    App.ui.busy = false;
    toast(e.message || 'Adjustment failed', 'err');

};

App.actions.packSubmitSheet = async function(){
  if(App.ui.busy) return;
  const f = App.ui.packSheetForm;
  if(!f.date) return toast('Select a date', 'err');
  const validLines = f.lines.filter(function(l){ return l.finishedProductId && Number(l.qty)>0; });
  if(!validLines.length) return toast('Add at least one valid line item', 'err');

  const ts = new Date(f.date+'T12:00:00').getTime() || Date.now();
  // Resolve each line's raw material up front -- a finished product is always packed from exactly one raw material.
  const linesResolved = validLines.map(function(line){
    const fp = App.state.finishedProducts.find(function(p){return p.id===line.finishedProductId;});
    return {
      finishedProductId: line.finishedProductId,
      rawMaterialId: fp ? fp.rawMaterialId : '',
      cartonSize: (fp && fp.cartonSize) || 1,
      qty: Number(line.qty)
    };
  });

  const uniqueRawIds = linesResolved.reduce(function(arr,l){ if(l.rawMaterialId && arr.indexOf(l.rawMaterialId)===-1) arr.push(l.rawMaterialId); return arr; }, []);
  const uniqueFinishedIds = linesResolved.reduce(function(arr,l){ if(arr.indexOf(l.finishedProductId)===-1) arr.push(l.finishedProductId); return arr; }, []);
  const sheetRef = doc(collection(db,'packingSheets'));
  const txnRefs = linesResolved.map(function(){ return doc(collection(db,'transactions')); });
  const rawStockRefs = {};
  uniqueRawIds.forEach(function(id){ rawStockRefs[id] = doc(db,'stock',id); });
  const finishedStockRefs = {};
  uniqueFinishedIds.forEach(function(id){ finishedStockRefs[id] = doc(db,'finishedStock',id); });

  App.ui.busy = true;
  render();
  try{
    let assignedChallan = '';
    await runTransaction(db, async function(transaction){
      const claim = await claimChallanNumber(transaction, 'pack');
      const challanNo = claim.challanNo;

      const rawStockData = {};
      for(const id of uniqueRawIds){
        const snap = await transaction.get(rawStockRefs[id]);
        rawStockData[id] = snap.exists() ? snap.data() : {refill:0, loose:0};
      }
      const finishedStockData = {};
      for(const id of uniqueFinishedIds){
        const snap = await transaction.get(finishedStockRefs[id]);
        finishedStockData[id] = snap.exists() ? snap.data() : {finished:0};
      }
      const rawRunning = {};
      uniqueRawIds.forEach(function(id){ rawRunning[id] = Object.assign({}, rawStockData[id]); });
      const finishedRunning = {};
      uniqueFinishedIds.forEach(function(id){ finishedRunning[id] = Object.assign({}, finishedStockData[id]); });

      const txnIds = [];
      const linesOut = [];
      for(let i=0;i<linesResolved.length;i++){
        const line = linesResolved[i];
        if(!line.rawMaterialId) throw new Error('This finished product has no raw material set \u2014 check Settings');
        if(line.qty > rawRunning[line.rawMaterialId].refill) throw new Error('Not enough refill stock for '+rawMaterialName(line.rawMaterialId));
        const cartons = Math.floor(line.qty/line.cartonSize);
        const looseQty = line.qty % line.cartonSize;

        rawRunning[line.rawMaterialId].refill -= line.qty;
        rawRunning[line.rawMaterialId].loose += looseQty;
        finishedRunning[line.finishedProductId].finished += cartons;

        const txnData = buildTxnData('pack', line.finishedProductId, challanNo, '', ts, {
          rawMaterialId: line.rawMaterialId, qtyTaken: line.qty, cartonsProduced: cartons, looseProduced: looseQty
        });
        transaction.set(txnRefs[i], txnData);
        txnIds.push(txnRefs[i].id);
        transaction.set(doc(collection(db,'ledger')), buildLedgerData(txnRefs[i].id, ts, line.rawMaterialId, 'refill', -line.qty, rawRunning[line.rawMaterialId].refill, 'Sent to packing', challanNo, txnData.user));
        if(cartons>0) transaction.set(doc(collection(db,'ledger')), buildLedgerData(txnRefs[i].id, ts, line.finishedProductId, 'finished', cartons, finishedRunning[line.finishedProductId].finished, 'Packed \u2014 complete cartons', challanNo, txnData.user));
        if(looseQty>0) transaction.set(doc(collection(db,'ledger')), buildLedgerData(txnRefs[i].id, ts, line.rawMaterialId, 'loose', looseQty, rawRunning[line.rawMaterialId].loose, 'Packed \u2014 loose pieces', challanNo, txnData.user));

        linesOut.push({finishedProductId: line.finishedProductId, rawMaterialId: line.rawMaterialId, qty: line.qty, cartonsProduced: cartons, looseProduced: looseQty});
      }

      uniqueRawIds.forEach(function(id){ transaction.set(rawStockRefs[id], rawRunning[id]); });
      uniqueFinishedIds.forEach(function(id){ transaction.set(finishedStockRefs[id], finishedRunning[id]); });
      transaction.set(sheetRef, {
        date: f.date, challanNo: challanNo, lines: linesOut, txnIds: txnIds,
        voided:false, createdAt: Date.now(), editableUntil: Date.now()+editWindowMs()
      });
      transaction.set(claim.counterRef, {last: claim.nextNum});
      assignedChallan = challanNo;
    });

    App.ui.viewingPackSheetId = sheetRef.id;
    App.ui.packMode = 'view';
    App.ui.busy = false;
    showStamp('Packed \u00b7 '+assignedChallan);
    toast('Packing sheet saved as '+assignedChallan, 'ok');
    render();
  }catch(e){
    App.ui.busy = false;
    toast(e.message || 'Pack failed', 'err');
    render();
  }
};

        finishedStockRefs[id] = doc(db,'finishedStock',id);
        const snap = await transaction.get(finishedStockRefs[id]);
        finishedStockData[id] = snap.exists() ? snap.data() : {finished:0};
      }
      const rawRunning = {};
      uniqueRawIds.forEach(function(id){ rawRunning[id] = Object.assign({}, rawStockData[id]); });
      const finishedRunning = {};
      uniqueFinishedIds.forEach(function(id){ finishedRunning[id] = Object.assign({}, finishedStockData[id]); });

      const reversalSteps = [];
      txnSnaps.forEach(function(s, i){
        if(!s.exists() || s.data().voided) return;
        const t = s.data();
        if(finishedRunning[t.productId].finished - t.cartonsProduced < 0) throw new Error('Cannot void \u2014 cartons from "'+finishedProductName(t.productId)+'" have already been dispatched');
        if(rawRunning[t.rawMaterialId].loose - t.looseProduced < 0) throw new Error('Cannot void \u2014 loose pieces from "'+rawMaterialName(t.rawMaterialId)+'" have already been returned');
        rawRunning[t.rawMaterialId].refill += t.qtyTaken;
        rawRunning[t.rawMaterialId].loose -= t.looseProduced;
        finishedRunning[t.productId].finished -= t.cartonsProduced;
        reversalSteps.push({
          txnRef: txnRefs[i], finishedProductId: t.productId, rawMaterialId: t.rawMaterialId, t: t,
          snap: {refill:rawRunning[t.rawMaterialId].refill, loose:rawRunning[t.rawMaterialId].loose, finished:finishedRunning[t.productId].finished}
        });
      });

      const reason = 'Void \u2014 Challan '+sheet.challanNo;
      reversalSteps.forEach(function(step){
        transaction.update(step.txnRef, {voided:true});
        transaction.set(doc(collection(db,'ledger')), buildLedgerData(step.txnRef.id, Date.now(), step.rawMaterialId, 'refill', step.t.qtyTaken, step.snap.refill, reason, sheet.challanNo, App.state.meta.currentUser||'Operator'));
        if(step.t.cartonsProduced>0) transaction.set(doc(collection(db,'ledger')), buildLedgerData(step.txnRef.id, Date.now(), step.finishedProductId, 'finished', -step.t.cartonsProduced, step.snap.finished, reason, sheet.challanNo, App.state.meta.currentUser||'Operator'));
        if(step.t.looseProduced>0) transaction.set(doc(collection(db,'ledger')), buildLedgerData(step.txnRef.id, Date.now(), step.rawMaterialId, 'loose', -step.t.looseProduced, step.snap.loose, reason, sheet.challanNo, App.state.meta.currentUser||'Operator'));
      });
      uniqueRawIds.forEach(function(id){ transaction.set(rawStockRefs[id], rawRunning[id]); });
      uniqueFinishedIds.forEach(function(id){ transaction.set(finishedStockRefs[id], finishedRunning[id]); });
      transaction.update(sheetRef, {voided:true});
    });
    toast('Packing sheet voided', 'ok');
  }catch(e){
    toast(e.message || 'Failed to void sheet', 'err');
  }
};

  const validLines = f.lines.filter(function(l){ return l.productId && Number(l.qty)>0; });
  if(!validLines.length) return toast('Add at least one valid line item', 'err');

  const ts = new Date(f.date+'T12:00:00').getTime() || Date.now();
  const uniqueProductIds = validLines.reduce(function(arr,l){ if(arr.indexOf(l.productId)===-1) arr.push(l.productId); return arr; }, []);
  const sheetRef = doc(collection(db,'looseReturnSheets'));
  const txnRefs = validLines.map(function(){ return doc(collection(db,'transactions')); });
  const stockRefs = {};
  uniqueProductIds.forEach(function(pid){ stockRefs[pid] = doc(db,'stock',pid); });

  App.ui.busy = true;

  try{
    let assignedChallan = '';
    await runTransaction(db, async function(transaction){
      const claim = await claimChallanNumber(transaction, 'loose');
      const challanNo = claim.challanNo;

      const stockData = {};
      for(const pid of uniqueProductIds){
        const snap = await transaction.get(stockRefs[pid]);
        stockData[pid] = snap.exists() ? snap.data() : {refill:0, loose:0};
      }
      const running = {};

        running[line.productId].refill += qty;

        const txnData = buildTxnData('loose_return', line.productId, challanNo, '', ts, {qty: qty});

        txnIds.push(txnRefs[i].id);

        transaction.set(doc(collection(db,'ledger')), buildLedgerData(txnRefs[i].id, ts, line.productId, 'refill', qty, running[line.productId].refill, 'Received from loose-piece return', challanNo, txnData.user));

function downloadBlob(content, mime, filename){
  const blob = new Blob([content], {type: mime});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

App.actions.importJSONFile = function(inputEl){
  const file = inputEl.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async function(e){
    try{
      const parsed = JSON.parse(e.target.result);
      if(!confirm('Import will ADD these records into the shared cloud database (existing data is not removed). Continue?')) return;

      const mapCollections = ['stock','finishedStock'];
      const listCollections = ['rawMaterials','finishedProducts','transactions','materialInSheets','packingSheets','looseReturnSheets','dispatchSheets','ledger','counters'];
      const writes = [];
      mapCollections.concat(listCollections).forEach(function(col){
        const items = parsed[col];
        if(!items) return;
        if(mapCollections.indexOf(col)!==-1){
          Object.keys(items).forEach(function(pid){ writes.push({ref: doc(db,col,pid), data: items[pid]}); });
        } else if(Array.isArray(items)){
          items.forEach(function(item){
            const id = item.id || uid(col);
            const data = Object.assign({}, item); delete data.id;
            writes.push({ref: doc(db,col,id), data: data});
          });
        }
      });
      if(parsed.meta) writes.push({ref: doc(db,'meta','settings'), data: parsed.meta});

      // Firestore batches max out at 500 writes -- chunk to be safe.
      for(let i=0;i<writes.length;i+=400){
        const batch = writeBatch(db);
        writes.slice(i,i+400).forEach(function(w){ batch.set(w.ref, w.data); });
        await batch.commit();
      }
      toast('Data imported into the cloud', 'ok');
    }catch(err){
      toast('Import failed: '+err.message, 'err');
    }
  };
  reader.readAsText(file);
};

  }
};

/* ---------------- init ---------------- */
render(); // shows the "Connecting..." state immediately
onAuthStateChanged(auth, function(user){
  if(user) attachListeners();
});
signInAnonymously(auth).catch(function(e){
  App.ui.connectionError = e.message;
  render();
});
</script>
</body>
</html>
